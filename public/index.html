<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TraceUser — Username Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & Variables ─────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #09090e;
    --surface: #0f0f18;
    --border: #1e1e30;
    --accent: #00f5a0;
    --accent2: #00c2ff;
    --accent3: #ff3c6b;
    --text: #e0e0f0;
    --muted: #555577;
    --found: #00f5a0;
    --notfound: #1e1e30;
    --font-mono: 'Space Mono', monospace;
    --font-display: 'Syne', sans-serif;
    --glow: 0 0 20px rgba(0,245,160,0.3);
    --glow2: 0 0 20px rgba(0,194,255,0.3);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Noise grain overlay ──────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.6;
  }

  /* ── Grid background ──────────────────────────────────── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ───────────────────────────────────────────── */
  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ── Header ───────────────────────────────────────────── */
  header {
    padding: 56px 0 40px;
    text-align: center;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,245,160,0.08);
    border: 1px solid rgba(0,245,160,0.2);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .logo-badge span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; animation: blink 1.4s ease-in-out infinite; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(44px, 8vw, 88px);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 18px;
  }

  h1 em {
    font-style: normal;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }

  .site-count-badge {
    display: inline-block;
    background: rgba(0,194,255,0.08);
    border: 1px solid rgba(0,194,255,0.2);
    color: var(--accent2);
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 4px;
    margin-top: 14px;
    letter-spacing: 0.1em;
  }

  /* ── Search box ───────────────────────────────────────── */
  .search-wrapper {
    position: relative;
    max-width: 640px;
    margin: 48px auto 0;
  }

  .search-box {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px 6px 6px 20px;
    gap: 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-box:focus-within {
    border-color: rgba(0,245,160,0.5);
    box-shadow: var(--glow);
  }

  .at-sign {
    color: var(--accent);
    font-size: 20px;
    font-weight: 700;
    flex-shrink: 0;
    opacity: 0.7;
  }

  #username-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 18px;
    caret-color: var(--accent);
  }

  #username-input::placeholder { color: var(--muted); }

  #search-btn {
    background: linear-gradient(135deg, var(--accent), #00c89a);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 14px 28px;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
    white-space: nowrap;
    text-transform: uppercase;
  }

  #search-btn:hover { opacity: 0.9; transform: scale(1.02); }
  #search-btn:active { transform: scale(0.98); }
  #search-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ── Progress bar ─────────────────────────────────────── */
  #progress-section {
    max-width: 640px;
    margin: 20px auto 0;
    display: none;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-label { font-size: 12px; color: var(--muted); letter-spacing: 0.06em; }

  .progress-counts {
    font-size: 12px;
    color: var(--accent);
  }

  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }

  #progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 999px;
    transition: width 0.3s ease;
    box-shadow: 0 0 8px rgba(0,245,160,0.5);
  }

  .scan-status {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
    height: 18px;
  }

  .scan-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: blink 0.8s ease-in-out infinite; flex-shrink: 0; }

  /* ── Stats bar ────────────────────────────────────────── */
  #stats-bar {
    display: none;
    max-width: 640px;
    margin: 16px auto 0;
    display: none;
    gap: 12px;
  }

  #stats-bar.visible { display: flex; }

  .stat-pill {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    text-align: center;
  }

  .stat-num { font-family: var(--font-display); font-size: 26px; font-weight: 800; line-height: 1; }
  .stat-num.green { color: var(--accent); }
  .stat-num.red { color: var(--accent3); }
  .stat-num.blue { color: var(--accent2); }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 4px; letter-spacing: 0.08em; text-transform: uppercase; }

  /* ── Filter bar ───────────────────────────────────────── */
  #filter-bar {
    display: none;
    align-items: center;
    gap: 8px;
    margin: 32px 0 20px;
    flex-wrap: wrap;
  }

  #filter-bar.visible { display: flex; }
  .filter-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-right: 4px; }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: rgba(0,245,160,0.1); border-color: var(--accent); color: var(--accent); }
  .filter-btn.found-only.active { background: rgba(0,245,160,0.12); border-color: var(--accent); color: var(--accent); }

  /* ── Results grid ─────────────────────────────────────── */
  #results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    animation: cardIn 0.25s ease both;
    position: relative;
    overflow: hidden;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card.found {
    border-color: rgba(0,245,160,0.25);
    background: rgba(0,245,160,0.04);
  }

  .result-card.found:hover {
    border-color: rgba(0,245,160,0.6);
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0,245,160,0.15);
  }

  .result-card.found::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(to bottom, var(--accent), var(--accent2));
    border-radius: 10px 0 0 10px;
  }

  .result-card.not-found { opacity: 0.35; }
  .result-card.not-found:hover { opacity: 0.6; }

  .site-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .result-card.found .site-icon { border-color: rgba(0,245,160,0.2); }

  .site-info { flex: 1; min-width: 0; }

  .site-name {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .site-cat {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .site-status {
    font-size: 11px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .status-chip {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    letter-spacing: 0.08em;
    font-weight: 700;
    text-transform: uppercase;
  }

  .status-chip.found { background: rgba(0,245,160,0.15); color: var(--accent); }
  .status-chip.not-found { background: rgba(255,255,255,0.04); color: var(--muted); }
  .status-chip.checking { background: rgba(0,194,255,0.08); color: var(--accent2); animation: pulse 1s ease-in-out infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .status-ms { font-size: 9px; color: var(--muted); }

  /* ── Empty / Idle state ───────────────────────────────── */
  #idle-state {
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
  }

  .idle-icon {
    font-size: 64px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .idle-text { font-size: 14px; letter-spacing: 0.04em; }

  /* ── Copy export button ───────────────────────────────── */
  #export-btn {
    display: none;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
    margin-left: auto;
  }

  #export-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* ── Scrollbar ────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ── Footer ───────────────────────────────────────────── */
  footer {
    text-align: center;
    padding: 40px 0 20px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.06em;
    position: relative;
    z-index: 1;
  }

  /* ── Responsive ───────────────────────────────────────── */
  @media (max-width: 600px) {
    #results-grid { grid-template-columns: 1fr; }
    #search-btn { padding: 14px 18px; font-size: 13px; }
    h1 { font-size: 40px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <!-- Header -->
  <header>
    <div class="logo-badge"><span></span> OSINT &nbsp;·&nbsp; Username Intelligence</div>
    <h1>Trace<em>User</em></h1>
    <p class="tagline">// Hunt any username across the internet in seconds</p>
    <span class="site-count-badge" id="site-count-badge">Loading sites…</span>

    <!-- Search -->
    <div class="search-wrapper">
      <div class="search-box">
        <span class="at-sign">@</span>
        <input id="username-input" type="text" placeholder="enter username…" autocomplete="off" autocorrect="off" spellcheck="false" />
        <button id="search-btn">Search →</button>
      </div>

      <!-- Progress -->
      <div id="progress-section">
        <div class="progress-header">
          <span class="progress-label">// SCANNING</span>
          <span class="progress-counts" id="progress-counts">0 / 0</span>
        </div>
        <div class="progress-track"><div id="progress-fill"></div></div>
        <div class="scan-status">
          <div class="scan-dot" id="scan-dot" style="display:none"></div>
          <span id="scan-label">—</span>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div id="stats-bar">
      <div class="stat-pill">
        <div class="stat-num green" id="stat-found">0</div>
        <div class="stat-label">Found</div>
      </div>
      <div class="stat-pill">
        <div class="stat-num red" id="stat-not">0</div>
        <div class="stat-label">Not Found</div>
      </div>
      <div class="stat-pill">
        <div class="stat-num blue" id="stat-total">0</div>
        <div class="stat-label">Checked</div>
      </div>
    </div>
  </header>

  <!-- Filter + Export row -->
  <div id="filter-bar">
    <span class="filter-label">Filter:</span>
    <div class="filter-row" id="filter-row">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn found-only" data-filter="found">✓ Found Only</button>
    </div>
    <button id="export-btn">⬇ Export Found</button>
  </div>

  <!-- Results -->
  <div id="results-grid">
    <div id="idle-state" style="grid-column:1/-1">
      <div class="idle-icon">⌕</div>
      <div class="idle-text">Enter a username to begin scanning 120+ platforms</div>
    </div>
  </div>
</div>

<footer>TraceUser — for investigative & educational use only &nbsp;·&nbsp; <span id="year"></span></footer>

<!-- Category icons map -->
<script>
const CAT_ICONS = {
  Social: '👥', Dev: '💻', Gaming: '🎮', Video: '📹',
  Music: '🎵', Art: '🎨', Forum: '💬', Pro: '💼',
  Blog: '✍️', Crypto: '🔐', Fitness: '🏃', News: '📰',
  Edu: '🎓', Shop: '🛒', Chat: '💬', Misc: '🌐',
};

let allResults = [];
let currentFilter = 'all';
let searching = false;
let eventSource = null;

// Init
document.getElementById('year').textContent = new Date().getFullYear();

fetch('/api/sites')
  .then(r => r.json())
  .then(d => {
    document.getElementById('site-count-badge').textContent = `Scanning ${d.count}+ platforms`;
  })
  .catch(() => {
    document.getElementById('site-count-badge').textContent = '120+ platforms';
  });

// Search trigger
document.getElementById('search-btn').addEventListener('click', startSearch);
document.getElementById('username-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startSearch();
});

function startSearch() {
  const raw = document.getElementById('username-input').value.trim();
  if (!raw || searching) return;
  const username = raw.toLowerCase().replace(/[^a-z0-9._-]/g, '');
  if (!username) return;

  // Reset
  if (eventSource) { eventSource.close(); eventSource = null; }
  allResults = [];
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === 'all'));
  document.getElementById('results-grid').innerHTML = '';
  document.getElementById('stat-found').textContent = '0';
  document.getElementById('stat-not').textContent = '0';
  document.getElementById('stat-total').textContent = '0';
  document.getElementById('export-btn').style.display = 'none';

  searching = true;
  document.getElementById('search-btn').disabled = true;
  document.getElementById('search-btn').textContent = 'Scanning…';

  // Show progress
  const ps = document.getElementById('progress-section');
  ps.style.display = 'block';
  document.getElementById('scan-dot').style.display = 'inline-block';
  document.getElementById('stats-bar').classList.add('visible');
  document.getElementById('filter-bar').classList.add('visible');
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('progress-counts').textContent = '0 / ?';
  document.getElementById('scan-label').textContent = 'Initializing scan…';

  eventSource = new EventSource(`/api/search?username=${encodeURIComponent(username)}`);

  eventSource.addEventListener('start', e => {
    const d = JSON.parse(e.data);
    document.getElementById('progress-counts').textContent = `0 / ${d.total}`;
    document.getElementById('scan-label').textContent = `Scanning as @${d.username}`;
  });

  eventSource.addEventListener('result', e => {
    const d = JSON.parse(e.data);
    allResults.push(d);

    // Update progress
    const pct = Math.round((d.completed / d.total) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-counts').textContent = `${d.completed} / ${d.total}`;
    document.getElementById('scan-label').textContent = `Checked ${d.name}`;

    // Stats
    const found = allResults.filter(r => r.found).length;
    const notFound = allResults.filter(r => !r.found).length;
    document.getElementById('stat-found').textContent = found;
    document.getElementById('stat-not').textContent = notFound;
    document.getElementById('stat-total').textContent = d.completed;

    // Add card if matches current filter
    if (currentFilter === 'all' || (currentFilter === 'found' && d.found)) {
      renderCard(d);
    }
  });

  eventSource.addEventListener('done', e => {
    finishSearch();
  });

  eventSource.onerror = () => {
    finishSearch();
  };
}

function finishSearch() {
  searching = false;
  if (eventSource) { eventSource.close(); eventSource = null; }

  document.getElementById('search-btn').disabled = false;
  document.getElementById('search-btn').textContent = 'Search →';
  document.getElementById('scan-dot').style.display = 'none';
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('scan-label').textContent = `Scan complete — ${allResults.filter(r => r.found).length} profiles found`;
  document.getElementById('export-btn').style.display = 'flex';
}

function renderCard(r) {
  const grid = document.getElementById('results-grid');
  const card = document.createElement('a');
  card.className = `result-card ${r.found ? 'found' : 'not-found'}`;
  card.href = r.found ? r.url : '#';
  card.target = '_blank';
  card.rel = 'noopener noreferrer';
  card.dataset.cat = r.cat;
  card.dataset.found = r.found;
  if (!r.found) card.addEventListener('click', e => e.preventDefault());

  const icon = CAT_ICONS[r.cat] || '🌐';

  card.innerHTML = `
    <div class="site-icon">${icon}</div>
    <div class="site-info">
      <div class="site-name">${escapeHtml(r.name)}</div>
      <div class="site-cat">${r.cat}</div>
    </div>
    <div class="site-status">
      <span class="status-chip ${r.found ? 'found' : 'not-found'}">${r.found ? 'Found' : 'N/A'}</span>
      ${r.ms ? `<span class="status-ms">${r.ms}ms</span>` : ''}
    </div>
  `;

  grid.appendChild(card);
}

function reRender() {
  document.getElementById('results-grid').innerHTML = '';
  const filtered = currentFilter === 'found' ? allResults.filter(r => r.found) : allResults;
  filtered.forEach(renderCard);
}

// Filter buttons
document.getElementById('filter-row').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  currentFilter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
  reRender();
});

// Export
document.getElementById('export-btn').addEventListener('click', () => {
  const found = allResults.filter(r => r.found);
  const text = found.map(r => `${r.name}: ${r.url}`).join('\n');
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `traceuser_${document.getElementById('username-input').value.trim()}.txt`;
  a.click();
});

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
</body>
</html>
